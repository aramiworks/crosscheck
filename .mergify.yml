queue_rules:
  - name: default
    merge_method: squash
    update_method: rebase

pull_request_rules:
  - name: Queue dependabot PRs
    conditions:
      - author~=^dependabot\[bot\]$
      - check-success=lint
      - check-success=changeset
    actions:
      queue:
        name: default

  - name: Queue changeset release PRs
    conditions:
      - author=github-actions[bot]
      - head~=^changeset-release/
      - check-success=lint
    actions:
      queue:
        name: default

  - name: Queue approved PRs
    conditions:
      - "#approved-reviews-by>=1"
      - check-success=lint
      - check-success=changeset
    actions:
      queue:
        name: default
